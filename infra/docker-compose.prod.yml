services:
  clickrank-backend:
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_HOSTS: ${DB_HOSTS:-postgres:5432}
      REDIS_CLUSTER_NODES: ${REDIS_CLUSTER_NODES:-redis:6379}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q UP"]
      interval: 20s
      timeout: 5s
      retries: 8

  api-gateway:
    restart: unless-stopped
    environment:
      GATEWAY_REQUIRE_AUTH: ${GATEWAY_REQUIRE_AUTH:-true}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CLICKRANK_BACKEND_URI: ${CLICKRANK_BACKEND_URI:-http://clickrank-backend:8081}
      OAUTH2_ISSUER_URI: ${OAUTH2_ISSUER_URI:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 20s
      timeout: 5s
      retries: 8

  analytics-service:
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep -q UP"]
      interval: 20s
      timeout: 5s
      retries: 8

  ml-ranking-service:
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/health | grep -q '\"status\":\"ok\"'"]
      interval: 20s
      timeout: 5s
      retries: 8

  frontend:
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_healthy
      ml-ranking-service:
        condition: service_healthy
