apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-ranking-service
  labels:
    app: ml-ranking-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-ranking-service
  template:
    metadata:
      labels:
        app: ml-ranking-service
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ml-ranking-service
          image: ghcr.io/clickrank/ml-ranking-service:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8084
              name: http
          env:
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: clickrank-secrets
                  key: POSTGRES_URL
            - name: LOG_LEVEL
              value: INFO
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 8
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ml-ranking-service
  labels:
    app: ml-ranking-service
spec:
  selector:
    app: ml-ranking-service
  ports:
    - name: http
      port: 8084
      targetPort: http
  type: ClusterIP
