apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: clickrank-alert-rules
  labels:
    app.kubernetes.io/name: clickrank
spec:
  groups:
    - name: clickrank.availability
      rules:
        - alert: ClickRankBackendDown
          expr: up{job="clickrank-backend"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "ClickRank backend is down"
            description: "No successful scrape for clickrank-backend for 2 minutes."

        - alert: ApiGatewayDown
          expr: up{job="api-gateway"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "API Gateway is down"
            description: "No successful scrape for api-gateway for 2 minutes."

    - name: clickrank.latency-and-errors
      rules:
        - alert: High5xxRate
          expr: |
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
            /
            sum(rate(http_server_requests_seconds_count[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High 5xx rate"
            description: "5xx responses are above 5% for 10 minutes."

        - alert: HighP95Latency
          expr: |
            histogram_quantile(
              0.95,
              sum by (le) (rate(http_server_requests_seconds_bucket[5m]))
            ) > 0.8
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High p95 latency"
            description: "API p95 latency is above 800ms for 10 minutes."

    - name: clickrank.resources
      rules:
        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod restart spike"
            description: "Container restarted more than 3 times in 15 minutes."

        - alert: HighCpuUsage
          expr: |
            sum(rate(container_cpu_usage_seconds_total{container!="",pod!=""}[5m])) by (pod)
            /
            sum(kube_pod_container_resource_limits{resource="cpu"}) by (pod) > 0.85
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage"
            description: "Pod CPU usage is above 85% of limit for 15 minutes."
