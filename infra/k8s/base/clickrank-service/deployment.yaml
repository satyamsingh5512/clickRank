apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickrank-deployment
  labels:
    app: clickrank
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clickrank
  template:
    metadata:
      labels:
        app: clickrank
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: clickrank
          image: ghcr.io/clickrank/clickrank-service:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: clickrank-config
            - secretRef:
                name: clickrank-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: clickrank-service
spec:
  selector:
    app: clickrank
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
  type: ClusterIP
