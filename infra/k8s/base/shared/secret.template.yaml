apiVersion: v1
kind: Secret
metadata:
  name: clickrank-secrets
  labels:
    app.kubernetes.io/name: clickrank

type: Opaque
stringData:
  DB_PASSWORD: "CHANGE_ME"
  REDIS_PASSWORD: "CHANGE_ME"
  OAUTH2_ISSUER_URI: "https://issuer.example.com/realms/clickrank"
  POSTGRES_URL: "postgresql://clickrank:CHANGE_ME@postgres:5432/clickrank_db"
