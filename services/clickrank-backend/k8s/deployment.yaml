apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickrank-deployment
  labels:
    app: clickrank
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1       # How many pods we can add at a time
      maxUnavailable: 0 # Zero downtime, always keep 3 available
  selector:
    matchLabels:
      app: clickrank
  template:
    metadata:
      labels:
        app: clickrank
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
    spec:
      containers:
        - name: clickrank
          image: ghcr.io/yourusername/clickrank-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: clickrank-config
          # Example of fetching secrets securely
          # env:
          #   - name: DB_PASSWORD
          #     valueFrom:
          #       secretKeyRef:
          #         name: clickrank-secrets
          #         key: db-password
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
