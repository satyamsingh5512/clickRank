version: '3.8'

services:
  keycloak:
    image: quay.io/keycloak/keycloak:22.0.5
    container_name: keycloak
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    command:
      - start-dev
    ports:
      - "8082:8080" # Maps to 8082 locally to avoid conflict with Kafdrop
    restart: unless-stopped

  # Example of secure Redis with ACLs enabled
  redis-secure:
    image: redis:7-alpine
    container_name: redis-secure
    ports:
      - "6380:6379"
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./security/redis/redis.conf:/usr/local/etc/redis/redis.conf
      - ./security/redis/users.acl:/usr/local/etc/redis/users.acl
    restart: unless-stopped
